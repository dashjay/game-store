# Workspace-wide Cargo configuration.
#
# I-03 introduces `gamestore-engine`, which depends on `rocksdb` (bundled
# RocksDB, compiled from C++). On this image the default `cc`/`c++` alternative
# is clang, which here cannot find the libstdc++ headers (when compiling bundled
# RocksDB) nor the libstdc++.so link path (when linking the C++ RocksDB into the
# Rust artifacts). g++ handles both, so we pin the C/C++ toolchain and linker to
# GCC. This mirrors `spike/rust/.cargo/config.toml`, promoted to the repo root so
# every workspace crate builds consistently.
#
# If your environment has a fully working clang toolchain you can delete this
# file or override these values.

[env]
CC = "gcc"
CXX = "g++"

[target.x86_64-unknown-linux-gnu]
linker = "g++"
