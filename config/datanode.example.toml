# Example GameStore DataNode configuration.
# Run with: cargo run -p gamestore-datanode -- --config config/datanode.example.toml
# Any field may also be overridden via env (e.g. GAMESTORE_SERVER__PORT=7000)
# or CLI flags (--bind / --port).

[server]
bind = "127.0.0.1"
port = 6380

[logging]
# Log level or full EnvFilter directive, e.g. "info" or "gamestore=debug,info".
level = "info"

[metrics]
# Install the Prometheus recorder at startup (the /metrics HTTP endpoint is I-07).
enabled = true
