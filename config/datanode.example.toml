# Example GameStore DataNode configuration.
# Run with: cargo run -p gamestore-datanode -- --config config/datanode.example.toml
# Any field may also be overridden via env (e.g. GAMESTORE_SERVER__PORT=7000,
# GAMESTORE_STORAGE__DATA_DIR=/var/lib/gamestore) or CLI flags
# (--bind / --port / --data-dir).

[server]
bind = "127.0.0.1"
port = 6380

[storage]
# Directory holding the persistent data. Created on startup if missing. Data
# written here survives process restarts. Contains two subdirectories:
#   <data_dir>/engine  — the RocksDB general engine
#   <data_dir>/wal     — the write-ahead log (I-08)
data_dir = "./data"

[wal]
# Write-ahead log (I-08). Every write is appended here and fsync'd before it is
# applied to the engine, so acknowledged writes survive a crash. Concurrent
# writers share one fsync (group commit). RocksDB's own WAL is disabled on this
# path — the WAL below is authoritative.
#   enabled          — false uses a no-op WAL (NO crash durability; benchmarks
#                      of the fsync cost only)
#   segment_max_bytes — roll to a new WAL segment at this size
#   checkpoint_bytes  — once the retained log reaches this size, flush the
#                      engine and GC the redundant log prefix
enabled = true
segment_max_bytes = 67108864    # 64 MiB
checkpoint_bytes = 268435456    # 256 MiB

[logging]
# Log level or full EnvFilter directive, e.g. "info" or "gamestore=debug,info".
level = "info"
# Commands slower than this many milliseconds go to the slow log (WARN on the
# `gamestore::slowlog` target) and datanode_slow_commands_total. Redis default.
slow_log_threshold_ms = 10

[metrics]
# Install the Prometheus recorder and serve the /metrics HTTP endpoint (I-07):
#   curl http://127.0.0.1:9600/metrics
enabled = true
bind = "127.0.0.1"
port = 9600
